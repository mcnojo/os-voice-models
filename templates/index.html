<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local Voice Assistant</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 800px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 32px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .status-bar {
            background: #f5f5f5;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #ccc;
        }

        .status-indicator.connected {
            background: #10b981;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }
        }

        .status-text {
            color: #666;
            font-size: 14px;
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        button {
            padding: 15px 30px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            flex: 1;
            min-width: 150px;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .btn-recording {
            background: #ef4444;
            color: white;
            animation: recording-pulse 1.5s infinite;
        }

        @keyframes recording-pulse {

            0%,
            100% {
                box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7);
            }

            50% {
                box-shadow: 0 0 0 10px rgba(239, 68, 68, 0);
            }
        }

        .btn-secondary {
            background: #e5e7eb;
            color: #333;
        }

        .btn-secondary:hover {
            background: #d1d5db;
        }

        .transcript-container {
            background: #f9fafb;
            border-radius: 10px;
            padding: 20px;
            min-height: 300px;
            max-height: 400px;
            overflow-y: auto;
            margin-bottom: 20px;
        }

        .message {
            margin-bottom: 15px;
            padding: 12px 15px;
            border-radius: 8px;
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            background: #dbeafe;
            margin-left: 40px;
        }

        .message.assistant {
            background: #f3e8ff;
            margin-right: 40px;
        }

        .message-label {
            font-weight: 600;
            font-size: 12px;
            text-transform: uppercase;
            margin-bottom: 5px;
            color: #666;
        }

        .message-text {
            color: #333;
            line-height: 1.5;
        }

        .error {
            background: #fee2e2;
            color: #991b1b;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            display: none;
        }

        .info-box {
            background: #eff6ff;
            border-left: 4px solid #3b82f6;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 5px;
            font-size: 14px;
            color: #1e40af;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
            color: #666;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            border: 3px solid #f3f4f6;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>os voice test</h1>
        <p class="subtitle">Local STT / LLM / TTS pipeline</p>

        <div class="status-bar">
            <div class="status-indicator" id="statusIndicator"></div>
            <span class="status-text" id="statusText">Connecting...</span>
        </div>

        <div class="error" id="errorBox"></div>

        <div class="controls">
            <button id="recordBtn" class="btn-primary" disabled>Start Recording</button>
            <button id="resetBtn" class="btn-secondary">Reset Conversation</button>
        </div>

        <div class="loading" id="loadingIndicator">
            <div class="spinner"></div>
            <p>Processing...</p>
        </div>

        <div class="transcript-container" id="transcript">
            <p style="color: #999; text-align: center;">Your conversation will appear here...</p>
        </div>
    </div>

    <script>
        let ws = null;
        let mediaRecorder = null;
        let audioChunks = [];
        let isRecording = false;
        let audioContext = null;
        let isProcessing = false;

        const recordBtn = document.getElementById('recordBtn');
        const resetBtn = document.getElementById('resetBtn');
        const transcript = document.getElementById('transcript');
        const statusIndicator = document.getElementById('statusIndicator');
        const statusText = document.getElementById('statusText');
        const errorBox = document.getElementById('errorBox');
        const loadingIndicator = document.getElementById('loadingIndicator');

        // Initialize WebSocket connection
        function connectWebSocket() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.host}/voice`;

            ws = new WebSocket(wsUrl);

            ws.onopen = () => {
                statusIndicator.classList.add('connected');
                statusText.textContent = 'Connected';
                recordBtn.disabled = false;
                hideError();
            };

            ws.onmessage = async (event) => {
                const data = JSON.parse(event.data);

                if (data.type === 'transcription') {
                    addMessage('user', data.text);
                } else if (data.type === 'response') {
                    addMessage('assistant', data.text);
                } else if (data.type === 'audio_response') {
                    await playAudioResponse(data.audio, data.sample_rate);
                    isProcessing = false;
                    loadingIndicator.classList.remove('active');
                } else if (data.type === 'error') {
                    showError(data.message);
                    isProcessing = false;
                    loadingIndicator.classList.remove('active');
                } else if (data.type === 'reset_complete') {
                    clearTranscript();
                }
            };

            ws.onerror = (error) => {
                console.error('WebSocket error:', error);
                showError('Connection error. Please refresh the page.');
            };

            ws.onclose = () => {
                statusIndicator.classList.remove('connected');
                statusText.textContent = 'Disconnected';
                recordBtn.disabled = true;
                setTimeout(connectWebSocket, 3000);
            };
        }

        // Start/stop recording
        recordBtn.addEventListener('click', async () => {
            if (!isRecording && !isProcessing) {
                await startRecording();
            } else if (isRecording) {
                await stopRecording();
            }
        });

        async function startRecording() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    audio: {
                        channelCount: 1,
                        sampleRate: 16000,
                        echoCancellation: true,
                        noiseSuppression: true
                    }
                });

                audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });

                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];

                mediaRecorder.ondataavailable = (event) => {
                    if (event.data.size > 0) {
                        audioChunks.push(event.data);
                    }
                };

                mediaRecorder.onstop = async () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    await processAudio(audioBlob);
                    stream.getTracks().forEach(track => track.stop());
                };

                mediaRecorder.start(100); // Collect data every 100ms
                isRecording = true;
                recordBtn.textContent = 'Stop Recording';
                recordBtn.classList.add('btn-recording');
                hideError();
            } catch (error) {
                console.error('Error starting recording:', error);
                showError('Could not access microphone. Please grant permission and try again.');
            }
        }

        async function stopRecording() {
            if (mediaRecorder && isRecording) {
                mediaRecorder.stop();
                isRecording = false;
                isProcessing = true;
                recordBtn.textContent = 'Start Recording';
                recordBtn.classList.remove('btn-recording');
                recordBtn.disabled = true;
                loadingIndicator.classList.add('active');
            }
        }
        async function processAudio(audioBlob) {
            try {
                // Convert WebM to PCM16
                const arrayBuffer = await audioBlob.arrayBuffer();
                const audioBuffer = await audioContext.decodeAudioData(arrayBuffer);

                // Get PCM data
                const pcmData = audioBuffer.getChannelData(0);

                // Convert float32 to int16
                const int16Data = new Int16Array(pcmData.length);
                for (let i = 0; i < pcmData.length; i++) {
                    const s = Math.max(-1, Math.min(1, pcmData[i]));
                    int16Data[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
                }

                // Convert to base64 in chunks to avoid stack overflow
                // Process the data in chunks of 32KB at a time
                const chunkSize = 32768;
                const uint8Array = new Uint8Array(int16Data.buffer);
                let binaryString = '';

                for (let i = 0; i < uint8Array.length; i += chunkSize) {
                    const chunk = uint8Array.slice(i, Math.min(i + chunkSize, uint8Array.length));
                    binaryString += String.fromCharCode.apply(null, chunk);
                }

                const base64Audio = btoa(binaryString);

                // Send to server
                ws.send(JSON.stringify({
                    type: 'audio',
                    audio: base64Audio
                }));

                ws.send(JSON.stringify({
                    type: 'audio_end'
                }));
            } catch (error) {
                console.error('Error processing audio:', error);
                showError('Error processing audio. Please try again.');
                isProcessing = false;
                loadingIndicator.classList.remove('active');
                recordBtn.disabled = false;
            }
        }

        async function playAudioResponse(base64Audio, sampleRate) {
            try {
                // Decode base64 to ArrayBuffer
                const binaryString = atob(base64Audio);
                const bytes = new Uint8Array(binaryString.length);
                for (let i = 0; i < binaryString.length; i++) {
                    bytes[i] = binaryString.charCodeAt(i);
                }

                // Convert int16 to float32
                const int16Array = new Int16Array(bytes.buffer);
                const float32Array = new Float32Array(int16Array.length);
                for (let i = 0; i < int16Array.length; i++) {
                    float32Array[i] = int16Array[i] / 32768.0;
                }

                // Create audio buffer
                const playbackContext = new (window.AudioContext || window.webkitAudioContext)();
                const audioBuffer = playbackContext.createBuffer(1, float32Array.length, sampleRate || 16000);
                audioBuffer.getChannelData(0).set(float32Array);

                // Play audio
                const source = playbackContext.createBufferSource();
                source.buffer = audioBuffer;
                source.connect(playbackContext.destination);
                source.start(0);

                source.onended = () => {
                    recordBtn.disabled = false;
                };
            } catch (error) {
                console.error('Error playing audio:', error);
                recordBtn.disabled = false;
            }
        }

        // Reset conversation
        resetBtn.addEventListener('click', () => {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'reset' }));
            }
        });

        function addMessage(role, text) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;

            const label = document.createElement('div');
            label.className = 'message-label';
            label.textContent = role === 'user' ? 'You' : 'Assistant';

            const textDiv = document.createElement('div');
            textDiv.className = 'message-text';
            textDiv.textContent = text;

            messageDiv.appendChild(label);
            messageDiv.appendChild(textDiv);

            // Remove placeholder if it exists
            const placeholder = transcript.querySelector('p[style*="color: #999"]');
            if (placeholder) {
                placeholder.remove();
            }

            transcript.appendChild(messageDiv);
            transcript.scrollTop = transcript.scrollHeight;
        }

        function clearTranscript() {
            transcript.innerHTML = '<p style="color: #999; text-align: center;">Conversation reset. Start speaking to begin a new conversation.</p>';
        }

        function showError(message) {
            errorBox.textContent = message;
            errorBox.style.display = 'block';
        }

        function hideError() {
            errorBox.style.display = 'none';
        }

        // Initialize connection on load
        connectWebSocket();

        // Keep-alive ping every 30 seconds
        setInterval(() => {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'ping' }));
            }
        }, 30000);
    </script>
</body>

</html>
